name: Deploy to AWS EC2 with ECR

on:
  push:
    branches:
      - live

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: challenge-contango
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Prepare .env file
      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE_PRODUCTION }}" > .env

      # 4. Log in to Amazon ECR
      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      # 5. Build Docker image (no DB connection at build)
      - name: Build Docker image
        run: |
          docker build \
            --build-arg ENV_FILE=.env \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG .

      # 6. Push Docker image to ECR
      - name: Push Docker image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      # 7. Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/challenge-contango

            # Save the secret ENV file on EC2
            echo "${{ secrets.ENV_FILE_PRODUCTION }}" > .env

            # Pull ECR image
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com
            docker compose pull || echo "ECR pull failed, using local build"

            # Build local image if needed
            docker compose build

            # Start containers
            docker compose up -d --remove-orphans

            # Run Prisma migrations after DB is up
            docker compose exec next-app npx prisma migrate deploy

            docker image prune -af
            echo "✅ Deployment complete"
